name: Thursday Newsletter Draft
on:
  schedule:
    - cron: '0 15 * * 4'
  workflow_dispatch:
jobs:
  draft_newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-genai requests
      - name: Run draft script
        env:
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          KLAVIYO_KEY: ${{ secrets.KLAVIYO_KEY }}
          KLAVIYO_LIST: ${{ secrets.KLAVIYO_LIST }}
          KLAVIYO_TEMPLATE_ID: ${{ secrets.KLAVIYO_TEMPLATE_ID }}
        run: python newsletter_bot.py
